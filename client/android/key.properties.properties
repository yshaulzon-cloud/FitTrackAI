# Copy this file to android/key.properties and fill in your real values.
# android/key.properties is gitignored so secrets stay local.
#
# storeFile = ABSOLUTE path to the keystore.
#   Example: C:/Users/avisb/FitTrackAI/keystores/fitvora-release.keystore
#   (forward slashes work on Windows too; backslashes need to be escaped)

storeFile=C:/Users/avisb/FitTrackAI/keystores/fitvora-release.keystore
storePassword=YOUR_KEYSTORE_PASSWORD_HERE
keyAlias=YOUR_KEY_ALIAS_HERE
keyPassword=YOUR_KEY_PASSWORD_HERE
