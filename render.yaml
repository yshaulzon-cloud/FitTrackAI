services:
  - type: web
    name: bodysync-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install --prefix server
    startCommand: node server/server.js
    healthCheckPath: /health
    envVars:
      # Sensitive vars — set the actual values in Render dashboard
      # (Settings → Environment) so they are not committed to Git.
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Public configuration — safe to commit.
      - key: CORS_ORIGIN
        value: https://app.digtal-c.co.il
      - key: NODE_VERSION
        value: 20.11.0
